name: Sync Upstream & Publish

on:
  # Run every 6 hours to catch openclaw releases quickly
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Also publish on direct version tag push
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to commit package.json bumps
  id-token: write   # needed for npm provenance

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# 1. Check for new openclaw release and bump durar version if needed
# ─────────────────────────────────────────────────────────────────────────────
  sync:
    name: Sync upstream version
    runs-on: ubuntu-latest
    # Skip on direct tag push — version is already set manually
    if: "!startsWith(github.ref, 'refs/tags/')"

    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      new_version:    ${{ steps.check.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for new openclaw release
        id: check
        run: |
          node scripts/sync-upstream.mjs
          RESULT=$(cat .sync-result)
          if [[ "$RESULT" == "no-change" ]]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            VERSION="${RESULT#new-version:}"
            echo "should_publish=true"  >> $GITHUB_OUTPUT
            echo "new_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git config user.name  "durar-bot"
          git config user.email "bot@durar.app"
          git add package.json CHANGELOG.md
          git commit -m "chore: sync openclaw upstream → durar@${{ steps.check.outputs.new_version }}"
          git tag "v${{ steps.check.outputs.new_version }}"
          git push origin HEAD --tags

# ─────────────────────────────────────────────────────────────────────────────
# 2. Publish to npm (runs after sync, or on direct tag push)
# ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: sync
    if: |
      always() && (
        (needs.sync.result == 'success' && needs.sync.outputs.should_publish == 'true') ||
        startsWith(github.ref, 'refs/tags/')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the latest commit (which may include the version bump above)
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify durar binary is executable
        run: |
          chmod +x durar.mjs
          # Smoke test: just importing the shim shouldn't crash
          node --input-type=module <<'EOF'
          import { existsSync } from 'node:fs'
          const ok = existsSync('./durar.mjs')
          if (!ok) { console.error('durar.mjs not found'); process.exit(1) }
          console.log('✓ durar.mjs present')
          EOF

      - name: Get version from package.json
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version not already published
        run: |
          PUBLISHED=$(npm view durar versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q '"${{ steps.ver.outputs.version }}"'; then
            echo "Version ${{ steps.ver.outputs.version }} already on npm — skipping."
            exit 0
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name:     "durar v${{ steps.ver.outputs.version }}"
          body: |
            Synced with upstream openclaw.

            **Install:**
            ```bash
            npm install -g durar@${{ steps.ver.outputs.version }}
            ```

            **Full changelog:** [CHANGELOG.md](CHANGELOG.md)
          generate_release_notes: true
          make_latest: true
