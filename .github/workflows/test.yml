name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Smoke test on ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:   [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm install

      - name: Verify durar.mjs exists and is valid ESM
        run: |
          node --input-type=module <<'EOF'
          import { existsSync } from 'node:fs'
          if (!existsSync('./durar.mjs')) {
            console.error('FAIL: durar.mjs missing')
            process.exit(1)
          }
          console.log('PASS: durar.mjs present')
          EOF

      - name: Verify package.json bin field
        run: |
          node --input-type=module <<'EOF'
          import { createRequire } from 'node:module'
          const r   = createRequire(import.meta.url)
          const pkg = r('./package.json')
          if (!pkg.bin?.durar) {
            console.error('FAIL: package.json missing bin.durar')
            process.exit(1)
          }
          if (pkg.bin.durar !== './durar.mjs') {
            console.error('FAIL: bin.durar should point to ./durar.mjs')
            process.exit(1)
          }
          console.log('PASS: bin.durar =', pkg.bin.durar)
          EOF

      - name: Verify scripts exist
        run: |
          node --input-type=module <<'EOF'
          import { existsSync } from 'node:fs'
          const files = [
            'scripts/postinstall.mjs',
            'scripts/migrate.mjs',
            'scripts/sync-upstream.mjs',
          ]
          let ok = true
          for (const f of files) {
            if (existsSync(f)) {
              console.log('PASS:', f)
            } else {
              console.error('FAIL:', f, 'missing')
              ok = false
            }
          }
          if (!ok) process.exit(1)
          EOF

      - name: Verify sync-upstream script parses correctly
        run: node --check scripts/sync-upstream.mjs

      - name: Verify migrate script parses correctly
        run: node --check scripts/migrate.mjs

      - name: Verify postinstall parses correctly
        run: node --check scripts/postinstall.mjs
